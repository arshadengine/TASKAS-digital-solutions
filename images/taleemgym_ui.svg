<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background:#0f172a; font-family:system-ui, -apple-system, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" fill="#1e293b" rx="0" />
  <line x1="200" y1="0" x2="200" y2="500" stroke="#334155" stroke-width="1" />
  <text x="24" y="40" font-size="18" font-weight="700" fill="#ffffff">Taleem Gym</text>
  
  <rect x="16" y="80" width="168" height="36" rx="8" fill="#4d7c0f" />
  <text x="32" y="103" font-size="13" font-weight="600" fill="#ffffff">Member Portal</text>
  
  <text x="32" y="155" font-size="13" font-weight="500" fill="#94a3b8">Workouts</text>
  <text x="32" y="205" font-size="13" font-weight="500" fill="#94a3b8">Trainers</text>
  <text x="32" y="255" font-size="13" font-weight="500" fill="#94a3b8">Diet Plans</text>
  <text x="32" y="305" font-size="13" font-weight="500" fill="#94a3b8">Membership</text>
  <text x="32" y="355" font-size="13" font-weight="500" fill="#94a3b8">Settings</text>

  <!-- Header -->
  <rect x="200" y="0" width="600" height="64" fill="#1e293b" />
  <line x1="200" y1="64" x2="800" y2="64" stroke="#334155" stroke-width="1" />
  <text x="224" y="40" font-size="16" font-weight="600" fill="#ffffff">Fitness Overview</text>
  <circle cx="750" cy="32" r="16" fill="#475569" />
  
  <!-- KPI Grid -->
  <g transform="translate(224, 88)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="16" y="28" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">CALORIES BURNED</text>
    <text x="16" y="58" font-size="20" font-weight="700" fill="#ffffff">24,850 kcal</text>
    <text x="16" y="74" font-size="10" font-weight="500" fill="#84cc16">+8.4% vs last week</text>

    <!-- Card 2 -->
    <rect x="184" y="0" width="168" height="88" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="200" y="28" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">ACTIVE DAYS</text>
    <text x="200" y="58" font-size="20" font-weight="700" fill="#ffffff">18 Days</text>
    <text x="200" y="74" font-size="10" font-weight="500" fill="#84cc16">+2 days increase</text>

    <!-- Card 3 -->
    <rect x="368" y="0" width="184" height="88" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="384" y="28" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">AVG HEART RATE</text>
    <text x="384" y="58" font-size="20" font-weight="700" fill="#ffffff">134 bpm</text>
    <text x="384" y="74" font-size="10" font-weight="500" fill="#ef4444">Peak 172 bpm</text>
  </g>

  <!-- Progress Chart -->
  <g transform="translate(224, 200)">
    <rect x="0" y="0" width="552" height="268" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#ffffff">Weekly Workout Intensity</text>
    
    <!-- Y-axis lines -->
    <line x1="40" y1="80" x2="520" y2="80" stroke="#334155" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="130" x2="520" y2="130" stroke="#334155" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="180" x2="520" y2="180" stroke="#334155" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="230" x2="520" y2="230" stroke="#334155" stroke-width="1" />
    
    <!-- Chart Path -->
    <path d="M 60 210 Q 120 120 180 160 T 300 110 T 420 90 T 500 60" fill="none" stroke="#84cc16" stroke-width="3" />
    <path d="M 60 210 Q 120 120 180 160 T 300 110 T 420 90 T 500 60 L 500 230 L 60 230 Z" fill="url(#gymGrad)" opacity="0.15" />
    
    <circle cx="500" cy="60" r="5" fill="#84cc16" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- X-axis Labels -->
    <text x="60" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Mon</text>
    <text x="148" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Tue</text>
    <text x="236" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Wed</text>
    <text x="324" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Thu</text>
    <text x="412" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Fri</text>
    <text x="500" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Sat</text>
  </g>
  
  <defs>
    <linearGradient id="gymGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#84cc16" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
</svg>
