<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background:#f8fafc; font-family:system-ui, -apple-system, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" fill="#ffffff" />
  <line x1="200" y1="0" x2="200" y2="500" stroke="#f1f5f9" stroke-width="1" />
  <text x="24" y="40" font-size="18" font-weight="700" fill="#0f172a">UrbanFlow</text>
  
  <rect x="16" y="80" width="168" height="36" rx="8" fill="#faf5ff" />
  <text x="32" y="103" font-size="13" font-weight="600" fill="#7e22ce">Traffic Map</text>
  
  <text x="32" y="155" font-size="13" font-weight="500" fill="#64748b">Sensors</text>
  <text x="32" y="205" font-size="13" font-weight="500" fill="#64748b">Optimization</text>
  <text x="32" y="255" font-size="13" font-weight="500" fill="#64748b">Analytics</text>
  <text x="32" y="305" font-size="13" font-weight="500" fill="#64748b">Settings</text>

  <!-- Header -->
  <rect x="200" y="0" width="600" height="64" fill="#ffffff" />
  <line x1="200" y1="64" x2="800" y2="64" stroke="#f1f5f9" stroke-width="1" />
  <text x="224" y="40" font-size="16" font-weight="600" fill="#0f172a">City Traffic Intelligence</text>
  <circle cx="750" cy="32" r="16" fill="#e2e8f0" />
  
  <!-- KPI Grid -->
  <g transform="translate(224, 88)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="16" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">ACTIVE SENSORS</text>
    <text x="16" y="58" font-size="24" font-weight="700" fill="#0f172a">234 / 240</text>
    <text x="16" y="74" font-size="10" font-weight="500" fill="#16a34a">97.5% operational</text>

    <rect x="184" y="0" width="168" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="200" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">AVG SPEED</text>
    <text x="200" y="58" font-size="24" font-weight="700" fill="#0f172a">42 km/h</text>
    <text x="200" y="74" font-size="10" font-weight="500" fill="#ea580c">-4.2% vs last hour</text>

    <rect x="368" y="0" width="184" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="384" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">CONGESTION INDEX</text>
    <text x="384" y="58" font-size="24" font-weight="700" fill="#e11d48">58%</text>
    <text x="384" y="74" font-size="10" font-weight="500" fill="#e11d48">Moderate Peak</text>
  </g>

  <!-- Map Representation Grid -->
  <g transform="translate(224, 200)">
    <rect x="0" y="0" width="552" height="268" rx="12" fill="#e2e8f0" />
    
    <!-- Grid gridlines mimicking map blocks -->
    <path d="M 0 50 L 552 50 M 0 100 L 552 100 M 0 150 L 552 150 M 0 200 L 552 200 M 0 250 L 552 250" stroke="#f1f5f9" stroke-width="2" />
    <path d="M 100 0 L 100 268 M 200 0 L 200 268 M 300 0 L 300 268 M 400 0 L 400 268 M 500 0 L 500 268" stroke="#f1f5f9" stroke-width="2" />
    
    <!-- Highways/Roads -->
    <path d="M 30 268 L 300 130 L 520 20" fill="none" stroke="#a855f7" stroke-width="10" opacity="0.8" />
    <path d="M 0 80 L 300 130 L 552 200" fill="none" stroke="#22c55e" stroke-width="8" opacity="0.8" />
    <path d="M 120 0 L 300 130 L 350 268" fill="none" stroke="#ef4444" stroke-width="12" opacity="0.8" />
    
    <!-- Intersection Nodes -->
    <circle cx="300" cy="130" r="16" fill="#ef4444" opacity="0.3" />
    <circle cx="300" cy="130" r="6" fill="#ef4444" />
    <circle cx="120" cy="80" r="4" fill="#22c55e" />
    <circle cx="450" cy="65" r="4" fill="#a855f7" />
    
    <!-- Float Card Overlay on Map -->
    <rect x="360" y="140" width="168" height="96" rx="8" fill="#ffffff" opacity="0.95" stroke="#f1f5f9" stroke-width="1" />
    <text x="376" y="162" font-size="11" font-weight="700" fill="#0f172a">Intersection Node 14</text>
    <text x="376" y="182" font-size="10" fill="#64748b">Congestion: High</text>
    <text x="376" y="198" font-size="10" fill="#64748b">Flow: 1,420 cars/hr</text>
    <text x="376" y="214" font-size="10" font-weight="600" fill="#ef4444">Reroute recommended</text>
  </g>
</svg>