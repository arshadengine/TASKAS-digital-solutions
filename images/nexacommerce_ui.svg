<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background:#f8fafc; font-family:system-ui, -apple-system, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" fill="#ffffff" rx="0" />
  <line x1="200" y1="0" x2="200" y2="500" stroke="#f1f5f9" stroke-width="1" />
  <text x="24" y="40" font-size="18" font-weight="700" fill="#0f172a">NexaCommerce</text>
  
  <rect x="16" y="80" width="168" height="36" rx="8" fill="#fff7ed" />
  <text x="32" y="103" font-size="13" font-weight="600" fill="#ea580c">Dashboard</text>
  
  <text x="32" y="155" font-size="13" font-weight="500" fill="#64748b">Products</text>
  <text x="32" y="205" font-size="13" font-weight="500" fill="#64748b">Orders</text>
  <text x="32" y="255" font-size="13" font-weight="500" fill="#64748b">Customers</text>
  <text x="32" y="305" font-size="13" font-weight="500" fill="#64748b">Analytics</text>
  <text x="32" y="355" font-size="13" font-weight="500" fill="#64748b">Settings</text>

  <!-- Header -->
  <rect x="200" y="0" width="600" height="64" fill="#ffffff" />
  <line x1="200" y1="64" x2="800" y2="64" stroke="#f1f5f9" stroke-width="1" />
  <text x="224" y="40" font-size="16" font-weight="600" fill="#0f172a">Overview</text>
  <circle cx="750" cy="32" r="16" fill="#e2e8f0" />
  
  <!-- KPI Grid -->
  <g transform="translate(224, 88)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="16" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">TOTAL REVENUE</text>
    <text x="16" y="58" font-size="20" font-weight="700" fill="#0f172a">$84,912.45</text>
    <text x="16" y="74" font-size="10" font-weight="500" fill="#16a34a">+12.4% vs last mo</text>

    <!-- Card 2 -->
    <rect x="184" y="0" width="168" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="200" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">ORDERS</text>
    <text x="200" y="58" font-size="20" font-weight="700" fill="#0f172a">1,842</text>
    <text x="200" y="74" font-size="10" font-weight="500" fill="#16a34a">+8.2% vs last mo</text>

    <!-- Card 3 -->
    <rect x="368" y="0" width="184" height="88" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="384" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">CONVERSION RATE</text>
    <text x="384" y="58" font-size="20" font-weight="700" fill="#0f172a">3.92%</text>
    <text x="384" y="74" font-size="10" font-weight="500" fill="#ea580c">+0.4% vs last mo</text>
  </g>

  <!-- Sales Chart -->
  <g transform="translate(224, 200)">
    <rect x="0" y="0" width="552" height="268" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="1" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#0f172a">Sales Over Time</text>
    
    <!-- Y-axis lines -->
    <line x1="40" y1="80" x2="520" y2="80" stroke="#f8fafc" stroke-width="1" />
    <line x1="40" y1="130" x2="520" y2="130" stroke="#f8fafc" stroke-width="1" />
    <line x1="40" y1="180" x2="520" y2="180" stroke="#f8fafc" stroke-width="1" />
    <line x1="40" y1="230" x2="520" y2="230" stroke="#f1f5f9" stroke-width="1" />
    
    <!-- Chart Path -->
    <path d="M 60 210 Q 120 180 180 140 T 300 160 T 420 100 T 500 70" fill="none" stroke="#f97316" stroke-width="3" />
    <path d="M 60 210 Q 120 180 180 140 T 300 160 T 420 100 T 500 70 L 500 230 L 60 230 Z" fill="url(#salesGrad)" opacity="0.1" />
    
    <circle cx="500" cy="70" r="5" fill="#f97316" stroke="#ffffff" stroke-width="1.5" />
    
    <!-- X-axis Labels -->
    <text x="60" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Jan</text>
    <text x="148" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Feb</text>
    <text x="236" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Mar</text>
    <text x="324" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Apr</text>
    <text x="412" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">May</text>
    <text x="500" y="250" font-size="10" fill="#94a3b8" text-anchor="middle">Jun</text>
  </g>
  
  <defs>
    <linearGradient id="salesGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>
</svg>