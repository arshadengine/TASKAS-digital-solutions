<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background:#0b0f19; font-family:system-ui, -apple-system, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="500" fill="#0f172a" rx="0" />
  <line x1="200" y1="0" x2="200" y2="500" stroke="#1e293b" stroke-width="1" />
  <text x="24" y="40" font-size="18" font-weight="700" fill="#ffffff">TechVersa</text>
  
  <rect x="16" y="80" width="168" height="36" rx="8" fill="#0369a1" />
  <text x="32" y="103" font-size="13" font-weight="600" fill="#ffffff">Workspace</text>
  
  <text x="32" y="155" font-size="13" font-weight="500" fill="#64748b">Services</text>
  <text x="32" y="205" font-size="13" font-weight="500" fill="#64748b">Pipelines</text>
  <text x="32" y="255" font-size="13" font-weight="500" fill="#64748b">Contracts</text>
  <text x="32" y="305" font-size="13" font-weight="500" fill="#64748b">Team Hub</text>
  <text x="32" y="355" font-size="13" font-weight="500" fill="#64748b">Invoices</text>

  <!-- Header -->
  <rect x="200" y="0" width="600" height="64" fill="#0f172a" />
  <line x1="200" y1="64" x2="800" y2="64" stroke="#1e293b" stroke-width="1" />
  <text x="224" y="40" font-size="16" font-weight="600" fill="#ffffff">Project Lifecycle</text>
  <circle cx="750" cy="32" r="16" fill="#334155" />
  
  <!-- KPI Grid -->
  <g transform="translate(224, 88)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="16" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">ACTIVE PROJECTS</text>
    <text x="16" y="58" font-size="20" font-weight="700" fill="#ffffff">12 Enterprise</text>
    <text x="16" y="74" font-size="10" font-weight="500" fill="#0284c7">+15% Growth Q2</text>

    <!-- Card 2 -->
    <rect x="184" y="0" width="168" height="88" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="200" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">ONBOARDING TIME</text>
    <text x="200" y="58" font-size="20" font-weight="700" fill="#ffffff">4.2 Days</text>
    <text x="200" y="74" font-size="10" font-weight="500" fill="#0284c7">-1.1 Days reduction</text>

    <!-- Card 3 -->
    <rect x="368" y="0" width="184" height="88" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="384" y="28" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.05em">SATISFACTION RATE</text>
    <text x="384" y="58" font-size="20" font-weight="700" fill="#ffffff">99.4 %</text>
    <text x="384" y="74" font-size="10" font-weight="500" fill="#0284c7">NPS +82 rating</text>
  </g>

  <!-- Performance Chart -->
  <g transform="translate(224, 200)">
    <rect x="0" y="0" width="552" height="268" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="16" y="28" font-size="13" font-weight="600" fill="#ffffff">System Integration Efficiency</text>
    
    <!-- Y-axis lines -->
    <line x1="40" y1="80" x2="520" y2="80" stroke="#1e293b" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="130" x2="520" y2="130" stroke="#1e293b" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="180" x2="520" y2="180" stroke="#1e293b" stroke-dasharray="4" stroke-width="1" />
    <line x1="40" y1="230" x2="520" y2="230" stroke="#1e293b" stroke-width="1" />
    
    <!-- Chart Path -->
    <path d="M 60 190 Q 120 160 180 100 T 300 80 T 420 140 T 500 50" fill="none" stroke="#38bdf8" stroke-width="3" />
    <path d="M 60 190 Q 120 160 180 100 T 300 80 T 420 140 T 500 50 L 500 230 L 60 230 Z" fill="url(#techGrad)" opacity="0.1" />
    
    <circle cx="500" cy="50" r="5" fill="#38bdf8" stroke="#0f172a" stroke-width="1.5" />
    
    <!-- X-axis Labels -->
    <text x="60" y="250" font-size="10" fill="#64748b" text-anchor="middle">Jan</text>
    <text x="148" y="250" font-size="10" fill="#64748b" text-anchor="middle">Feb</text>
    <text x="236" y="250" font-size="10" fill="#64748b" text-anchor="middle">Mar</text>
    <text x="324" y="250" font-size="10" fill="#64748b" text-anchor="middle">Apr</text>
    <text x="412" y="250" font-size="10" fill="#64748b" text-anchor="middle">May</text>
    <text x="500" y="250" font-size="10" fill="#64748b" text-anchor="middle">Jun</text>
  </g>
  
  <defs>
    <linearGradient id="techGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
</svg>
